{% extends 'Base.html' %}
{% load static %}
{% block title %}Home{% endblock title %}


{% block main-content %}


<section class="" style="background-color: #eee;">
    <div class="container h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-lg-12 col-xl-11">
          <div class="card text-black" style="border-radius: 25px;">
            <div class="card-body p-md-5">
              <div class="row justify-content-center">
                <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
  
                  <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4"><span class="text-danger">Sign</span> <span class="text-success">up</span> </p>
  
                  <form class="mx-1 mx-md-4" action="{% url 'regestration' %}"  enctype="multipart/form-data" method="post">
                    {% csrf_token %}

                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-user fa-lg me-3 fa-fw"></i>
                      <div class="form-outline flex-fill mb-0">
                        <label class="form-label fw-bold text-dark" for="form3Example4c">Your Name</label>
                        <input type="text" id="form3Example1c" name="username" class="form-control" />
                       
                      </div>
                    </div>
  
                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-file-image me-4"></i>
                      <div class="form-outline flex-fill mb-0">
                        <label class="form-label fw-bold text-dark" for="form3Example4c">Profile</label>
                        <input type="file" accept="image/*" id="form3Example4c" name="profile" class="form-control" />
                        
                      </div>
                    </div>


                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-envelope fa-lg me-3 fa-fw"></i>
                      <div class="form-outline flex-fill mb-0">
                        <label class="form-label fw-bold text-dark" for="form3Example4c">Youe Email</label>
                        <input type="email" id="form3Example3c" name="email" class="form-control" />
                      </div>
                    </div>
  

                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fa fa-address-book fa-lg me-3 fa-fw" aria-hidden="true"></i>
                      <div class="form-outline flex-fill mb-0">
                        <label class="form-label fw-bold text-dark" for="form3Example3c">Contact</label>
                        <input type="number" id="form3Example4c" name="contact" class="form-control" />
                      </div>
                    </div>


                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-lock fa-lg me-3 fa-fw"></i>
                      <div class="form-outline flex-fill mb-0">
                        <label class="form-label fw-bold text-dark" for="form3Example3c">Password</label>
                        <input type="password" id="form3Example4c" name="password" class="form-control" />
                      </div>
                    </div>
  
                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-key fa-lg me-3 fa-fw"></i>
                      <div class="form-outline flex-fill mb-0">
                        <label class="form-label fw-bold text-dark"  for="form3Example4c">Confirm Password</label>
                        <input type="password" id="form3Example4cd" name="confirm-password" class="form-control" />
                        <label class="form-label" for="form3Example4cd">Repeat your password</label>
                      </div>
                    </div>
  
                    <div class="form-check d-flex justify-content-center mb-5">
                      <input class="form-check-input me-2" type="checkbox" value="" id="form2Example3c" />
                      <label class="form-check-label" for="form2Example3">
                        I agree all statements in <a href="#!">Terms of service</a>
                      </label>
                    </div>
  
                    <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                      <input class="btn btn-primary btn-lg" type="submit" value="Register">
                    </div>
  
                  </form>
  
                </div>
                <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                  <img src="{% static 'app/images/banner/reg.png' %}" class="img-fluid" alt="Sample image">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  {% endblock main-content %}
